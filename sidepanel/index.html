<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Graph View</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── 토큰 입력 화면 ── -->
  <div id="token-screen" class="screen hidden">
    <div class="token-card">
      <div class="token-logo">⬡</div>
      <h2>Notion Graph View</h2>
      <p class="token-desc">워크스페이스의 DB 관계를 그래프로 시각화합니다.<br>Notion Integration 토큰을 입력하세요.</p>
      <input id="token-input" type="password" placeholder="ntn_  또는  secret_  로 시작하는 토큰"
             autocomplete="off" spellcheck="false" />
      <div id="token-error" class="token-error hidden"></div>
      <button id="token-save" class="btn-primary">연결하기</button>
      <a class="token-help" href="https://www.notion.so/my-integrations" target="_blank" rel="noopener noreferrer">
        토큰 발급 방법 →
      </a>
    </div>
  </div>

  <!-- ── 그래프 화면 ── -->
  <div id="graph-screen" class="screen hidden">

    <!-- 툴바 -->
    <div class="toolbar">
      <div class="toolbar-left">
        <input id="search-input" type="search" placeholder="페이지 검색..." autocomplete="off" />
      </div>
      <div class="toolbar-right">
        <span id="db-count" class="db-count"></span>
        <span id="cache-indicator" class="cache-indicator hidden"></span>
        <button id="btn-local"    class="icon-btn" title="로컬 그래프 (현재 페이지 중심)">⊙</button>
        <button id="btn-refresh"  class="icon-btn" title="새로고침">↺</button>
        <button id="btn-settings" class="icon-btn" title="설정">⚙</button>
        <button id="btn-disconnect" class="icon-btn" title="토큰 해제">⏏</button>
      </div>
    </div>

    <!-- 로컬 그래프 바 -->
    <div id="local-bar" class="local-bar hidden">
      <span class="local-label">⊙ 로컬</span>
      <span id="local-page-name" class="local-page-name">노션 페이지로 이동하세요</span>
      <div class="depth-btns">
        <span class="depth-label">깊이</span>
        <input id="depth-slider" type="range" min="1" max="5" step="1" value="1" class="depth-slider" />
        <span id="depth-val" class="depth-val">1</span>
      </div>
    </div>

    <!-- 그래프 영역 -->
    <div class="graph-wrap">

      <!-- 로딩 -->
      <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <span id="loading-msg">데이터 로딩 중...</span>
        <span id="loading-detail" class="loading-detail"></span>
      </div>

      <!-- 에러 -->
      <div id="error-overlay" class="error-overlay hidden">
        <div class="error-icon">✕</div>
        <p id="error-msg"></p>
        <button id="btn-retry" class="btn-primary">다시 시도</button>
      </div>

      <!-- 경고 배너 -->
      <div id="warning-banner" class="warning-banner hidden">
        <span id="warning-msg"></span>
      </div>

      <!-- 툴팁 -->
      <div id="tooltip" class="tooltip hidden"></div>

      <!-- D3 캔버스 -->
      <svg id="graph-svg"></svg>

      <!-- 설정 패널 -->
      <div id="settings-panel" class="settings-panel hidden">
        <div class="sp-header">
          <span>그래프 설정</span>
          <div class="sp-header-actions">
            <button id="settings-reset" class="sp-icon-btn" title="설정 초기화">↺</button>
            <button id="settings-close" class="sp-icon-btn" title="닫기">✕</button>
          </div>
        </div>
        <div class="sp-body">

          <!-- 프리셋 -->
          <div class="sp-section">
            <div class="sp-section-header">
              <span class="sp-section-arrow">▾</span><span>프리셋</span>
            </div>
            <div class="sp-section-body">
              <div class="preset-save-row">
                <input id="preset-name-input" type="text" placeholder="프리셋 이름..." maxlength="30" />
                <button id="preset-save-btn" class="preset-save-btn">저장</button>
              </div>
              <div id="preset-list" class="preset-list"></div>
            </div>
          </div>

          <!-- 필터 -->
          <div class="sp-section">
            <div class="sp-section-header">
              <span class="sp-section-arrow">▾</span><span>필터</span>
            </div>
            <div class="sp-section-body">
              <label class="sp-row sp-checkbox-row">
                <span>고립 노드 숨기기</span>
                <input type="checkbox" id="s-hide-orphans" />
              </label>
              <div class="sp-row">
                <span>최소 연결 수</span>
                <div class="sp-slider-wrap">
                  <input type="range" id="s-min-degree" min="0" max="10" step="1" value="0" />
                  <span class="sp-val" id="s-min-degree-val">0</span>
                </div>
              </div>
            </div>
          </div>

          <!-- 그룹 (DB 필터) -->
          <div class="sp-section">
            <div class="sp-section-header">
              <span class="sp-section-arrow">▾</span><span>그룹</span>
            </div>
            <div class="sp-section-body">
              <div class="sp-sort-row">
                <button class="sp-sort-btn active" data-sort="name">이름순</button>
                <button class="sp-sort-btn" data-sort="count">페이지 수</button>
                <button class="sp-sort-btn" data-sort="custom">수동</button>
              </div>
              <div id="sp-db-list" class="sp-db-list"></div>
            </div>
          </div>

          <!-- 표시 -->
          <div class="sp-section">
            <div class="sp-section-header">
              <span class="sp-section-arrow">▾</span><span>표시</span>
            </div>
            <div class="sp-section-body">
              <label class="sp-row sp-checkbox-row">
                <span>DB 소스 노드 표시</span>
                <input type="checkbox" id="s-show-db-nodes" />
              </label>
              <label class="sp-row sp-checkbox-row">
                <span>비DB 페이지 표시</span>
                <input type="checkbox" id="s-show-page-nodes" />
              </label>
              <label class="sp-row sp-checkbox-row">
                <span>화살표 표시</span>
                <input type="checkbox" id="s-show-arrows" />
              </label>
              <label class="sp-row sp-checkbox-row">
                <span>레이블 표시</span>
                <input type="checkbox" id="s-show-labels" checked />
              </label>
              <div class="sp-row">
                <span>텍스트 표시 시작점</span>
                <div class="sp-slider-wrap">
                  <input type="range" id="s-label-threshold" min="-3" max="3" step="0.25" value="0" />
                  <span class="sp-val" id="s-label-threshold-val">0.00</span>
                </div>
              </div>
              <div class="sp-row">
                <span>노드 크기</span>
                <div class="sp-slider-wrap">
                  <input type="range" id="s-node-size" min="0.1" max="5" step="0.1" value="1.0" />
                  <span class="sp-val" id="s-node-size-val">1.0</span>
                </div>
              </div>
              <div class="sp-row">
                <span>링크 두께</span>
                <div class="sp-slider-wrap">
                  <input type="range" id="s-link-width" min="0.1" max="5" step="0.1" value="1.5" />
                  <span class="sp-val" id="s-link-width-val">1.5</span>
                </div>
              </div>
            </div>
          </div>

          <!-- 장력 -->
          <div class="sp-section">
            <div class="sp-section-header">
              <span class="sp-section-arrow">▾</span><span>장력</span>
            </div>
            <div class="sp-section-body">
              <div class="sp-row">
                <span>중심 장력</span>
                <div class="sp-slider-wrap">
                  <input type="range" id="s-center-strength" min="0" max="1" step="0.01" value="0.3" />
                  <span class="sp-val" id="s-center-strength-val">0.30</span>
                </div>
              </div>
              <div class="sp-row">
                <span>반발력</span>
                <div class="sp-slider-wrap">
                  <input type="range" id="s-repel" min="0" max="20" step="0.5" value="7" />
                  <span class="sp-val" id="s-repel-val">7.0</span>
                </div>
              </div>
              <div class="sp-row">
                <span>반발 최대 거리</span>
                <div class="sp-slider-wrap">
                  <input type="range" id="s-repel-max" min="50" max="2000" step="50" value="300" />
                  <span class="sp-val" id="s-repel-max-val">300</span>
                </div>
              </div>
              <div class="sp-row">
                <span>링크 장력</span>
                <div class="sp-slider-wrap">
                  <input type="range" id="s-link-strength" min="0" max="1" step="0.01" value="0.7" />
                  <span class="sp-val" id="s-link-strength-val">0.70</span>
                </div>
              </div>
              <div class="sp-row">
                <span>링크 거리</span>
                <div class="sp-slider-wrap">
                  <input type="range" id="s-link-distance" min="30" max="500" step="10" value="150" />
                  <span class="sp-val" id="s-link-distance-val">150</span>
                </div>
              </div>
            </div>
          </div>

          <!-- 타임라인 -->
          <div class="sp-section">
            <div class="sp-section-header">
              <span class="sp-section-arrow">▾</span><span>타임라인</span>
            </div>
            <div class="sp-section-body">
              <div class="tl-controls">
                <button id="tl-play" class="tl-play-btn" disabled>▶</button>
                <input type="range" id="tl-slider" class="tl-slider" min="0" max="100" value="100" disabled />
                <span id="tl-date" class="tl-date">-</span>
              </div>
            </div>
          </div>

        </div>
      </div><!-- /settings-panel -->

    </div><!-- /graph-wrap -->
  </div><!-- /graph-screen -->

  <script src="../lib/d3.min.js"></script>
  <script src="graph.js"></script>
</body>
</html>
