<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>Notion Graph View</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 240px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      background: #111;
      color: #e0e0e0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .logo { font-size: 22px; }
    h1 { font-size: 14px; font-weight: 600; color: #fff; }
    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      margin-bottom: 14px;
    }
    .badge.connected { background: #052e16; color: #4ade80; }
    .badge.disconnected { background: #2d1515; color: #f87171; }
    button {
      width: 100%;
      padding: 8px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">⬡</span>
    <h1>Notion Graph View</h1>
  </div>
  <div id="badge" class="badge disconnected">연결 안 됨</div>
  <button id="open-panel">그래프 열기 (사이드패널)</button>
  <script src="popup.js"></script>
</body>
</html>
